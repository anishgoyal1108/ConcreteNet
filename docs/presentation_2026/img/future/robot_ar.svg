<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="serif">
  <defs>
    <marker id="fArrHead" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C9A84C"/>
    </marker>
    <radialGradient id="fBlotch" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#0D1B2A" stop-opacity="1"/>
      <stop offset="65%" stop-color="#0D1B2A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8DCE3"/>
      <stop offset="100%" stop-color="#B7BEC8"/>
    </linearGradient>
    <linearGradient id="arFieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- LEFT — autonomous robot scanning                                  -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- header -->
  <text x="215" y="42" text-anchor="middle"
        fill="#1B3A5C" font-size="22" font-weight="bold">Autonomous scan</text>

  <!-- ground / deck (top-down) -->
  <rect x="55" y="70" width="330" height="360"
        fill="url(#slabGrad)" stroke="#1B3A5C" stroke-width="1.6"/>

  <!-- serpentine coverage path (done so far: solid; remaining: dashed) -->
  <path d="M 85 110 L 355 110 L 355 150 L 85 150 L 85 190 L 355 190
           L 355 230 L 220 230"
        stroke="#1B3A5C" stroke-width="2.2" fill="none"/>
  <path d="M 220 230 L 85 230 L 85 270 L 355 270 L 355 310 L 85 310
           L 85 350 L 355 350 L 355 390 L 85 390"
        stroke="#1B3A5C" stroke-width="2" fill="none"
        stroke-dasharray="6 6" opacity="0.55"/>

  <!-- rebar grid visible faintly under the path -->
  <g stroke="#C9A84C" stroke-width="1.2" opacity="0.55">
    <line x1="100" y1="90" x2="100" y2="410"/>
    <line x1="155" y1="90" x2="155" y2="410"/>
    <line x1="210" y1="90" x2="210" y2="410"/>
    <line x1="265" y1="90" x2="265" y2="410"/>
    <line x1="320" y1="90" x2="320" y2="410"/>
  </g>

  <!-- robot cart at current sweep position -->
  <g transform="translate(220,230)">
    <rect x="-22" y="-14" width="44" height="22" rx="3"
          fill="#0D1B2A" stroke="#1B3A5C" stroke-width="1"/>
    <!-- wheels -->
    <circle cx="-14" cy="10" r="5" fill="#1B3A5C"/>
    <circle cx="14"  cy="10" r="5" fill="#1B3A5C"/>
    <!-- antenna dome -->
    <rect x="-10" y="-20" width="20" height="8" rx="2" fill="#C9A84C"/>
    <!-- RF indicator -->
    <path d="M 0,-24 Q 10,-30 20,-24" stroke="#C9A84C" stroke-width="1.4" fill="none"/>
    <path d="M 0,-28 Q 14,-36 28,-28" stroke="#C9A84C" stroke-width="1.4" fill="none"/>
  </g>

  <!-- reward symbol -->
  <g transform="translate(320,430)">
    <circle cx="0" cy="0" r="12" fill="#C9A84C"/>
    <text x="0" y="4" text-anchor="middle" fill="#0D1B2A"
          font-size="14" font-weight="bold">R</text>
  </g>
  <text x="320" y="465" text-anchor="middle"
        fill="#6B7A8D" font-size="12" font-style="italic">reward</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- CENTER — data/transmission arrow                                   -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- wave stack showing wireless stream -->
  <g transform="translate(460,200)">
    <path d="M 0,0  Q 40,-18 80,0" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <path d="M 0,20 Q 40,2   80,20" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <path d="M 0,40 Q 40,22  80,40" stroke="#C9A84C" stroke-width="2" fill="none"/>
  </g>

  <line x1="430" y1="265" x2="610" y2="265"
        stroke="#C9A84C" stroke-width="3.5" marker-end="url(#fArrHead)"/>
  <text x="520" y="253" text-anchor="middle"
        fill="#1B3A5C" font-size="15" font-style="italic">live inference +</text>
  <text x="520" y="290" text-anchor="middle"
        fill="#1B3A5C" font-size="15" font-style="italic">stereographic reprojection</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- RIGHT — engineer wearing AR looking through the deck               -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- header -->
  <text x="925" y="42" text-anchor="middle"
        fill="#1B3A5C" font-size="22" font-weight="bold">AR x-ray overlay</text>

  <!-- engineer silhouette (side view, simple) -->
  <g transform="translate(720,90)" fill="#1B3A5C" stroke="#0D1B2A" stroke-width="1.2">
    <!-- head -->
    <circle cx="60" cy="45" r="22"/>
    <!-- hardhat -->
    <path d="M 38,37 Q 60,12 82,37 L 82,41 L 38,41 Z" fill="#C9A84C" stroke="#0D1B2A"/>
    <!-- AR glasses -->
    <rect x="42" y="45" width="36" height="8" rx="2" fill="#C9A84C" opacity="0.85"/>
    <rect x="42" y="45" width="36" height="8" rx="2" fill="none" stroke="#0D1B2A" stroke-width="1"/>
    <!-- body -->
    <path d="M 42,70 L 78,70 L 86,160 L 34,160 Z" fill="#1B3A5C"/>
    <!-- vest stripe -->
    <path d="M 42,90 L 78,90" stroke="#C9A84C" stroke-width="3" fill="none"/>
    <!-- legs -->
    <rect x="42" y="160" width="14" height="55" fill="#0D1B2A"/>
    <rect x="64" y="160" width="14" height="55" fill="#0D1B2A"/>
  </g>

  <!-- AR gaze cone from glasses toward ground -->
  <path d="M 785,140 L 1140,330 L 1140,430 L 785,150 Z"
        fill="url(#arFieldGrad)" stroke="#C9A84C"
        stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ground surface line -->
  <line x1="690" y1="320" x2="1170" y2="320"
        stroke="#1B3A5C" stroke-width="2"/>
  <!-- hatch marks to indicate ground -->
  <g stroke="#6B7A8D" stroke-width="1">
    <line x1="690" y1="320" x2="680" y2="335"/>
    <line x1="720" y1="320" x2="710" y2="335"/>
    <line x1="750" y1="320" x2="740" y2="335"/>
  </g>

  <!-- cutaway view: see-through deck -->
  <rect x="785" y="320" width="385" height="150"
        fill="#E5E7EB" opacity="0.75" stroke="#1B3A5C" stroke-width="1.2"/>

  <!-- embedded rebars (small hyperbolic markers = cross sections) -->
  <g fill="#C9A84C" stroke="#0D1B2A" stroke-width="1">
    <circle cx="830"  cy="360" r="8"/>
    <circle cx="890"  cy="360" r="8"/>
    <circle cx="950"  cy="360" r="8"/>
    <circle cx="1010" cy="360" r="8"/>
    <circle cx="1070" cy="360" r="8"/>
    <circle cx="1130" cy="360" r="8"/>
  </g>

  <!-- defect blotch with red box overlay -->
  <ellipse cx="960" cy="420" rx="55" ry="22" fill="url(#fBlotch)"/>
  <rect x="895" y="398" width="130" height="50"
        fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <rect x="895" y="384" width="90" height="14" fill="#DC2626"/>
  <text x="940" y="395" text-anchor="middle"
        fill="white" font-size="11" font-weight="bold">void 0.91</text>

  <!-- floor label -->
  <text x="977" y="490" text-anchor="middle"
        fill="#6B7A8D" font-size="12" font-style="italic">see-through deck</text>
</svg>
